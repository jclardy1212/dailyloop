<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Loop">
<meta name="theme-color" content="#f7f7f4">
<title>Daily Loop</title>
<style>
  :root{
    --paper:#f7f7f4; --ink:#1c1d1a; --muted:#6b6d66; --line:#e3e2db;
    --card:#ffffff; --accent:#3b5b6b; --accent-soft:#e8f0f0; --kept:#2f5d4a;
    --warn-bg:#fbe7e4; --warn-ink:#7a2e1f; --tap:48px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--paper);color:var(--ink);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
  body{padding:max(16px,env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom))}
  .wrap{max-width:520px;margin:0 auto}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .hidden{display:none!important}

  /* header / day count */
  header{display:flex;align-items:baseline;justify-content:space-between;margin:4px 0 20px}
  .count{display:flex;align-items:baseline;gap:8px}
  .count b{font-size:34px;font-weight:650;letter-spacing:-.5px;color:var(--kept);font-variant-numeric:tabular-nums}
  .count span{font-size:13px;color:var(--muted)}
  .menu{display:flex;gap:4px}
  .menu button{padding:8px 10px;font-size:13px;color:var(--muted);border-radius:8px;min-height:var(--tap)}
  .menu button[aria-current="true"]{color:var(--ink);background:#ececE6}

  /* surface card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 20px;margin-bottom:14px}
  .reason{font-size:13px;color:var(--muted);margin:0 0 8px}
  .surface-text{font-size:21px;line-height:1.35;font-weight:550;margin:0 0 20px;word-break:break-word}
  .rough .surface-text{font-weight:600}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .actions .full{grid-column:1/-1}
  .btn{min-height:var(--tap);border-radius:12px;font-weight:550;font-size:15px;
    border:1px solid var(--line);background:#fbfbf9;color:var(--ink)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted);font-weight:500}
  .btn:active{transform:translateY(1px)}

  /* rough toggle row */
  .roughrow{display:flex;justify-content:center;margin:2px 0 18px}
  .roughrow button{font-size:13px;color:var(--muted);padding:10px 14px;min-height:var(--tap)}
  .roughrow button.on{color:var(--warn-ink)}

  /* capture */
  .capture{display:flex;gap:8px;margin-top:6px}
  .capture input{flex:1;min-height:var(--tap);padding:0 14px;border:1px solid var(--line);
    border-radius:12px;background:#fff;font:inherit}
  .capture input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  .capture .add{min-width:64px;border-radius:12px;background:var(--accent);color:#fff;font-weight:600}

  /* lists */
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:24px 0 10px;font-weight:600}
  .row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  .row .t{flex:1;word-break:break-word}
  .row .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent);white-space:nowrap}
  .pill.big{background:#f0ecec;color:#7a5b4f}
  .iconbtn{min-width:40px;min-height:40px;border-radius:10px;color:var(--muted);font-size:13px}
  .iconbtn:active{background:#efefe9}

  .empty{color:var(--muted);text-align:center;padding:28px 8px;line-height:1.6}
  .empty b{display:block;color:var(--ink);font-weight:600;margin-bottom:4px}

  /* done log */
  .dayblock{border-bottom:1px solid var(--line);padding:12px 0}
  .dayblock .d{font-size:12px;color:var(--muted);margin-bottom:6px}
  .dayblock .done{font-size:15px;padding:2px 0}

  /* banners */
  .banner{border-radius:12px;padding:12px 14px;font-size:14px;margin-bottom:14px;line-height:1.45}
  .banner.warn{background:var(--warn-bg);color:var(--warn-ink)}
  .banner.note{background:var(--accent-soft);color:var(--accent)}

  /* settings sheet */
  .sheet{position:fixed;inset:0;background:rgba(28,29,26,.35);display:flex;align-items:flex-end;justify-content:center;z-index:20}
  .sheet .panel{background:var(--paper);width:100%;max-width:520px;border-radius:18px 18px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto}
  .sheet h3{margin:0 0 4px;font-size:17px}
  .sheet p{color:var(--muted);font-size:14px;margin:0 0 16px}
  .sheet .btn{width:100%;margin-bottom:10px}
  .sheet label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px}
  .sheet input{width:100%;min-height:var(--tap);padding:0 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font:inherit}
  .sheet textarea{width:100%;min-height:120px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font:13px/1.4 ui-monospace,monospace}
  .closebar{display:flex;justify-content:flex-end}
  .closebar button{padding:8px 12px;color:var(--muted);min-height:44px}

  /* build/version stamp (debug aid) */
  .ver{text-align:center;color:var(--muted);font-size:11px;margin-top:22px;opacity:.7;font-variant-numeric:tabular-nums}

  /* keystone — domain routing */
  .pill.dom{background:#eef0ea;color:#3f5d3a}
  .route{background:#fafaf8;border:1px solid var(--line);border-radius:14px;padding:14px;margin:2px 0 14px}
  .routelabel{font-size:12px;color:var(--muted);margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{min-height:var(--tap);padding:0 16px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:14px;font-weight:550;color:var(--ink)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .pp{white-space:pre-wrap;word-break:break-word;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;margin:12px 0 10px;font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--ink)}
  .routeactions{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
  .routeactions .btn{width:auto;padding:0 18px}
  .dest{font-size:13px;color:var(--muted)}
  .route .btn.done{width:100%;margin-top:4px}
</style>
</head>
<body>
<div class="wrap" id="app"><!-- rendered by JS --></div>

<script>
'use strict';
/* ============================================================
   loop-core (inlined). Logic verified offline in node — 25/25.
   ============================================================ */
var DEADLINE_WINDOW_DAYS = 3, SCHEMA_VERSION = 2;
var BUILD = 'v2.1 \u00b7 2026-06-24 \u00b7 keystone'; // bump this each iteration so the footer shows what's live
// Sobriety anchor: local midnight Jan 14 2026. Month is 0-indexed (0 = January).
// The headline number is whole calendar days from here — never completion-based.
var SOBRIETY_ANCHOR = new Date(2026,0,14);

function dayKey(ts){var d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysUntil(deadlineTs,nowTs){var s=function(ts){var d=new Date(ts);d.setHours(0,0,0,0);return d.getTime();};return Math.round((s(deadlineTs)-s(nowTs))/86400000);}
function emptyState(now){return{v:SCHEMA_VERSION,startedAt:now,tasks:[],doneLog:{},passed:{day:null,ids:[]},current:null,
  roughFloor:'Do the one small thing you already know.'};}
function passedIdsForToday(s,now){return s.passed&&s.passed.day===dayKey(now)?s.passed.ids:[];}
function surfaceablePool(s,now){var p=passedIdsForToday(s,now);return s.tasks.filter(function(t){return t.triaged && !t.tooBig && p.indexOf(t.id)<0;});}
function selectAction(s,now,rough){
  if(rough)return{rough:true};
  var pool=surfaceablePool(s,now); if(pool.length===0)return null;
  var nd=pool.filter(function(t){return t.deadline!=null && daysUntil(t.deadline,now)<=DEADLINE_WINDOW_DAYS;})
    .sort(function(a,b){var da=daysUntil(a.deadline,now),db=daysUntil(b.deadline,now);return da!==db?da-db:a.createdAt-b.createdAt;});
  if(nd.length)return{taskId:nd[0].id,reason:'deadline'};
  var oldest=pool.slice().sort(function(a,b){return a.createdAt-b.createdAt;})[0];
  return{taskId:oldest.id,reason:'oldest'};
}
function reasonString(reason,task,now){
  if(reason==='oldest')return "it's been waiting the longest";
  if(reason==='deadline'){var n=daysUntil(task.deadline,now);
    if(n<0)return 'this was due '+Math.abs(n)+' day'+(Math.abs(n)===1?'':'s')+' ago';
    if(n===0)return 'this is due today'; if(n===1)return 'due tomorrow'; return 'due in '+n+' days';}
  return '';
}
function addTask(s,text,now){var id='t_'+now.toString(36)+'_'+Math.random().toString(36).slice(2,7);
  return Object.assign({},s,{tasks:s.tasks.concat([{id:id,text:text.trim(),createdAt:now,deadline:null,tooBig:false,triaged:false,domain:null}])});}
function triageTask(s,id,patch){return Object.assign({},s,{tasks:s.tasks.map(function(t){return t.id===id?
  Object.assign({},t,{
    deadline:patch.deadline===undefined?t.deadline:patch.deadline,
    tooBig:patch.tooBig===undefined?t.tooBig:patch.tooBig,
    triaged:patch.triaged===undefined?t.triaged:patch.triaged
  }):t;})});}
function deleteTask(s,id){return Object.assign({},s,{tasks:s.tasks.filter(function(t){return t.id!==id;})});}
function commitSurface(s,now,rough){var sel=selectAction(s,now,rough);
  if(sel===null)return Object.assign({},s,{current:null});
  if(sel.rough)return Object.assign({},s,{current:{rough:true}});
  return Object.assign({},s,{current:{taskId:sel.taskId,reason:sel.reason,taken:false}});}
function takeCurrent(s){if(!s.current||s.current.rough)return s;return Object.assign({},s,{current:Object.assign({},s.current,{taken:true})});}
function putBack(s){return Object.assign({},s,{current:null});}
function passCurrent(s,now){if(!s.current||s.current.rough)return Object.assign({},s,{current:null});
  var today=dayKey(now);var ids=s.passed&&s.passed.day===today?s.passed.ids:[];var set={};ids.concat([s.current.taskId]).forEach(function(i){set[i]=1;});
  return Object.assign({},s,{passed:{day:today,ids:Object.keys(set)},current:null});}
function completeCurrent(s,now){if(!s.current||s.current.rough)return s;var id=s.current.taskId;var task=s.tasks.find(function(t){return t.id===id;});
  if(!task)return Object.assign({},s,{current:null});var today=dayKey(now);var entry={id:task.id,text:task.text,completedAt:now};
  var arr=s.doneLog[today]?s.doneLog[today].concat([entry]):[entry];var dl=Object.assign({},s.doneLog);dl[today]=arr;
  return Object.assign({},s,{tasks:s.tasks.filter(function(t){return t.id!==id;}),doneLog:dl,current:null});}
// Item 5: headline number is whole calendar days from the anchor, recomputed every
// render, never completion-based, never +1. Survives a full storage wipe — it
// regenerates from the clock. doneLog no longer drives this number.
function dayCount(){
  var a=new Date(SOBRIETY_ANCHOR.getFullYear(),SOBRIETY_ANCHOR.getMonth(),SOBRIETY_ANCHOR.getDate());
  var n=new Date(); var t=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  return Math.round((t-a)/86400000);
}
// Item 6: the rough-day floor action is loggable — logging it meets today's bar.
// No task is removed (there's no task behind the floor); it just records a completion.
function completeRoughFloor(s,now){var today=dayKey(now);
  var entry={id:'floor_'+now,text:s.roughFloor,completedAt:now,floor:true};
  var arr=s.doneLog[today]?s.doneLog[today].concat([entry]):[entry];
  var dl=Object.assign({},s.doneLog);dl[today]=arr;
  return Object.assign({},s,{doneLog:dl});}
// The bar is one completion. True once today has any logged entry (floor or normal).
function isTodayComplete(s,now){var k=dayKey(now);return !!(s.doneLog[k]&&s.doneLog[k].length>0);}
// Migration: existing tasks predate the triaged field. Grandfather them to triaged:true
// so the live pile keeps surfacing — only NEW captures wait for triage.
function migrateTask(t){return Object.assign({triaged:true,deadline:null,tooBig:false,domain:null},t);}
function serialize(s){return JSON.stringify(s);}
function deserialize(json,now){if(!json)return emptyState(now);var p;try{p=JSON.parse(json);}catch(e){return emptyState(now);}
  if(!p||typeof p!=='object')return emptyState(now);var base=emptyState(now);
  return Object.assign({},base,p,{passed:p.passed||base.passed,doneLog:p.doneLog||base.doneLog,tasks:Array.isArray(p.tasks)?p.tasks.map(migrateTask):base.tasks});}

/* ============================================================
   storage glue — synchronous localStorage, in-memory is truth
   ============================================================ */
var KEY='cityDailyLoop.v1';
var storageOK=true;
function loadState(){
  try{ return deserialize(window.localStorage.getItem(KEY), Date.now()); }
  catch(e){ storageOK=false; return emptyState(Date.now()); }
}
function saveState(){
  try{ window.localStorage.setItem(KEY, serialize(state)); }
  catch(e){ storageOK=false; render(); }
}
var state = loadState();
var view = 'home';           // home | look | done
var roughMode = false;
var ensureNeeded = true;
var persistStatus = 'checking'; // 'on' | 'best-effort' | 'checking'

// --- API key: stored under its OWN key, never inside `state`, so serialize()/export
// --- can never carry it. No key set => app runs pure-deterministic, no model calls.
var APIKEY_STORE='cityDailyLoop.apiKey';
var apiKey='';
function loadApiKey(){ try{ apiKey=window.localStorage.getItem(APIKEY_STORE)||''; }catch(e){ apiKey=''; } }
function setApiKey(v){ apiKey=(v||'').trim();
  try{ if(apiKey) window.localStorage.setItem(APIKEY_STORE,apiKey); else window.localStorage.removeItem(APIKEY_STORE); }catch(e){} }

// Ask Chrome to mark this origin persistent so it survives storage pressure.
// HTTPS-only; harmless no-op where unsupported. Export remains the real backstop
// for the cases this can't cover (uninstall, manual "clear data", new device).
function requestPersistence(){
  try{
    if(typeof navigator!=='undefined' && navigator.storage && navigator.storage.persist){
      navigator.storage.persisted().then(function(already){
        if(already){ persistStatus='on'; if(sheetOpen) render(); return; }
        navigator.storage.persist().then(function(granted){
          persistStatus = granted ? 'on' : 'best-effort';
          if(sheetOpen) render();
        }).catch(function(){ persistStatus='best-effort'; });
      }).catch(function(){ persistStatus='best-effort'; });
    } else { persistStatus='best-effort'; }
  }catch(e){ persistStatus='best-effort'; }
}

function ensureSurface(){
  if(roughMode){ state=commitSurface(state,Date.now(),true); return; }
  if(!state.current){ state=commitSurface(state,Date.now(),false); }
}

/* ============================================================
   actions
   ============================================================ */
function commit(mut){ state=mut(state); saveState(); render(); }
function capture(){ var el=document.getElementById('cap'); var v=(el&&el.value||'').trim(); if(!v)return;
  state=addTask(state,v,Date.now()); el.value=''; saveState(); render(); el.focus(); }
function take(){ commit(takeCurrent); }
function back(){ commit(putBack); ensureSurface(); saveState(); render(); }
function pass(){ state=passCurrent(state,Date.now()); ensureSurface(); saveState(); render(); maybeModel(null); }
function done(){ state=completeCurrent(state,Date.now()); ensureSurface(); saveState(); render(); }
function toggleRough(){ roughMode=!roughMode; state=commitSurface(state,Date.now(),roughMode); saveState(); render(); }
function takeSpecific(id){ state=Object.assign({},state,{current:{taskId:id,reason:'oldest',taken:true}}); view='home'; saveState(); render(); }
function setView(v){ view=v; render(); }
function setDeadlineDays(id,days){ var dl = days===null?null: (function(){var d=new Date();d.setHours(0,0,0,0);return d.getTime()+days*86400000;})();
  commit(function(s){return triageTask(s,id,{deadline:dl});}); }
function toggleBig(id){ var t=state.tasks.find(function(x){return x.id===id;}); commit(function(s){return triageTask(s,id,{tooBig:!(t&&t.tooBig)});}); }
function removeTask(id){ commit(function(s){return deleteTask(s,id);}); }
function triageToPool(id){ state=triageTask(state,id,{triaged:true}); ensureSurface(); saveState(); render(); }
// Break down KEEPS the parent (Architect-ratified). The step enters the pile as a new
// untriaged capture; the original stays in the too-big area, intact, never deleted here.
function breakDown(id){ var step=prompt('One small first step:'); if(step==null)return; step=step.trim(); if(!step)return;
  state=addTask(state,step,Date.now()); saveState(); render(); }
function floorDone(){ state=completeRoughFloor(state,Date.now()); saveState(); render(); }

/* export / import — the data-integrity backstop */
function exportData(){
  var blob=new Blob([serialize(state)],{type:'application/json'});
  var url=URL.createObjectURL(blob); var a=document.createElement('a');
  a.href=url; a.download='daily-loop-backup-'+dayKey(Date.now())+'.json'; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
function importData(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=function(){ var f=inp.files[0]; if(!f)return; var r=new FileReader();
    r.onload=function(){ var next=deserialize(r.result,Date.now());
      if(!confirm('Replace everything on this device with the backup? Day count, tasks, and history will be overwritten.'))return;
      state=next; roughMode=false; state=commitSurface(state,Date.now(),false); saveState(); closeSheet(); render(); };
    r.readAsText(f); };
  inp.click();
}

/* ============================================================
   v2 intelligence layer — model only ever REPLACES a deterministic
   pick, after an interaction, and only on valid + in-time output.
   Every reason is validated true before it can reach the screen.
   Platform values verified live against Anthropic docs June 19 2026.
   ============================================================ */
var API_URL='https://api.anthropic.com/v1/messages';
var MODEL_ID='claude-haiku-4-5-20251001';
var ANTHROPIC_VERSION='2023-06-01';
var MODEL_TIMEOUT_MS=3000;
var modelToken=0; // guards against a stale async response overwriting a newer surface

var SELECTION_POLICY="You're given a few candidate tasks; pick the single best one to surface right now and classify the reason. Optimize for what the user can actually act on in their current situation: if statedContext is present, first narrow to tasks they could realistically do where they are, with the time and tools they named; within that set \u2014 or the whole list if no context was given or nothing fits \u2014 prefer a task with a deadline inside the window (soonest first), otherwise the oldest. Pick exactly one, only from the provided ids. Classify with the single most specific reason that is true of your pick given only the data provided; never assert a reason the data doesn't support. You are ranking tasks and have no information about the user \u2014 you need none.";

var SELECT_TASK_TOOL={name:'select_task',description:'Choose exactly one task to surface and classify the reason.',
  input_schema:{type:'object',properties:{
    id:{type:'string',description:'id of the chosen task; MUST be one of the provided candidate ids'},
    reason_code:{type:'string',enum:['oldest','deadline','fits-context']}
  },required:['id','reason_code']}};

function timeOfDayLabel(now){var h=new Date(now).getHours();return h<12?'morning':h<18?'afternoon':'evening';}

// Allow-list ONLY. Logistics, never psychology. Nothing personal can cross the wire even
// if it exists on the task object — this builder only ever reads these fields.
function buildPayload(s,now,statedContext){
  var pool=surfaceablePool(s,now);
  var candidates=pool.map(function(t){return {
    id:t.id, text:t.text,
    ageDays:Math.max(0,Math.round((now-t.createdAt)/86400000)),
    deadlineInDays:(t.deadline!=null)?daysUntil(t.deadline,now):null
  };});
  var ctx=(statedContext!=null&&String(statedContext).trim()!=='')?String(statedContext).trim():null;
  return {candidates:candidates, statedContext:ctx, timeOfDay:timeOfDayLabel(now), dayMode:'normal'};
}

// §10 validation + oldest hardening. ANY failure => keep the deterministic pick.
function validatePick(parsed,payload){
  if(!parsed||typeof parsed!=='object')return false;
  var ids=payload.candidates.map(function(c){return c.id;});
  var idx=ids.indexOf(parsed.id);
  if(idx<0)return false;                                                  // rule 1: real id
  if(['oldest','deadline','fits-context'].indexOf(parsed.reason_code)<0)return false; // rule 2: enum
  var c=payload.candidates[idx];
  if(parsed.reason_code==='deadline'){                                    // rule 3: real in-window deadline (overdue ok)
    if(c.deadlineInDays==null||c.deadlineInDays>DEADLINE_WINDOW_DAYS)return false;
  }
  if(parsed.reason_code==='fits-context'){                                // rule 4: context actually sent
    if(payload.statedContext==null)return false;
  }
  if(parsed.reason_code==='oldest'){                                      // rule 5 (hardening): chosen really is among the oldest
    var maxAge=Math.max.apply(null,payload.candidates.map(function(x){return x.ageDays;}));
    if(c.ageDays!==maxAge)return false;
  }
  return true;
}

// item 4 (Architect-ratified): size leads. A time/effort cue => "Fits the time you've got";
// otherwise a doability read => "Doable right where you are". One clause, never compounded.
function fitsContextString(statedContext){
  if(statedContext && /(\d+\s*(m|min|mins|minute|minutes|h|hr|hrs|hour|hours)\b|\bquick\b|\bbefore\b|\bby\b|\bsoon\b|\bfast\b)/i.test(statedContext))
    return "Fits the time you've got";
  return "Doable right where you are";
}

function modelPick(payload){
  var ctrl=new AbortController();
  var timer=setTimeout(function(){ctrl.abort();},MODEL_TIMEOUT_MS);
  var body={model:MODEL_ID,max_tokens:256,system:SELECTION_POLICY,
    messages:[{role:'user',content:JSON.stringify(payload)}],
    tools:[SELECT_TASK_TOOL],tool_choice:{type:'tool',name:'select_task'}}; // forced; thinking OFF (incompatible)
  return fetch(API_URL,{method:'POST',headers:{
      'x-api-key':apiKey,'anthropic-version':ANTHROPIC_VERSION,'content-type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true'
    },body:JSON.stringify(body),signal:ctrl.signal})
    .then(function(r){return r.json();})
    .then(function(data){clearTimeout(timer);
      var blocks=(data&&data.content)||[];
      for(var i=0;i<blocks.length;i++){ var b=blocks[i];
        if(b && b.type==='tool_use' && b.name==='select_task') return b.input; }
      return null;
    })
    .catch(function(){clearTimeout(timer);return null;}); // offline / abort / timeout / malformed => null
}

// Fired ONLY after an interaction (pass / stated-context). Never first paint, never rough day.
// A deterministic pick is already on screen; this may upgrade it, or silently leave it.
function maybeModel(statedContext){
  if(!apiKey||roughMode) return;                                          // no key or rough => deterministic stays
  if(typeof navigator!=='undefined' && navigator.onLine===false) return;  // offline => deterministic stays
  var now=Date.now();
  var payload=buildPayload(state,now,statedContext);
  if(payload.candidates.length===0) return;
  var token=++modelToken;
  modelPick(payload).then(function(parsed){
    if(token!==modelToken) return;                                        // a newer interaction superseded this
    if(!state.current || state.current.taken || state.current.rough) return; // user moved on
    if(!parsed || !validatePick(parsed,payload)) return;                  // invalid => keep deterministic
    var task=state.tasks.find(function(t){return t.id===parsed.id;});
    if(!task) return;
    var reasonText=(parsed.reason_code==='fits-context')
      ? fitsContextString(payload.statedContext)
      : reasonString(parsed.reason_code,task,now);
    state=Object.assign({},state,{current:{taskId:parsed.id,reason:parsed.reason_code,reasonText:reasonText,taken:false}});
    saveState(); render();
  });
}
function ctxSubmit(){ var el=document.getElementById('ctx'); var v=(el&&el.value||'').trim(); if(!v)return; maybeModel(v); }
function saveKey(){ var el=document.getElementById('apikey'); if(!el)return; var v=(el.value||'').trim(); if(!v)return; setApiKey(v); render(); }
function clearKey(){ setApiKey(''); render(); }

/* ============================================================
   render
   ============================================================ */
var sheetOpen=false;
function openSheet(){sheetOpen=true;render();}
function closeSheet(){sheetOpen=false;render();}

function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function render(){
  if(ensureNeeded){ ensureSurface(); ensureNeeded=false; saveState(); }
  var now=Date.now();
  var c=dayCount();
  var html='';

  // storage warning — directive, not mood
  if(!storageOK){
    html+='<div class="banner warn">This browser is blocking saved data, so nothing here will survive a reload. '
      +'Use Backup (top right) to keep your data, or open this in your normal browser tab.</div>';
  }

  html+='<header><div class="count"><b>'+c+'</b><span>'+(c===1?'day logged':'days logged')+'</span></div>'
    +'<div class="menu">'
    +'<button onclick="setView(\'home\')" aria-current="'+(view==='home')+'">Now</button>'
    +'<button onclick="setView(\'look\')" aria-current="'+(view==='look')+'">Pile</button>'
    +'<button onclick="setView(\'done\')" aria-current="'+(view==='done')+'">Done</button>'
    +'<button onclick="openSheet()" aria-label="Backup and settings">&#9881;</button>'
    +'</div></header>';

  if(view==='home') html+=renderHome(now);
  else if(view==='look') html+=renderLook(now);
  else html+=renderDone();

  if(sheetOpen) html+=renderSheet();

  html+='<div class="ver">'+esc(BUILD)+'</div>';

  document.getElementById('app').innerHTML=html;
  var cap=document.getElementById('cap'); // keep focus stable if present
}

function renderHome(now){
  var h='';
  var todayDone=isTodayComplete(state,now);

  // Item 6: floor-met rest-state. States a fact, never a verdict. Absent when unmet (neutral).
  if(todayDone){
    h+='<div class="banner note">Floor\u2019s done. That\u2019s a full day on the board. '
      +'Anything past here is extra \u2014 not the bar moving.</div>';
  }

  var cur=state.current;
  if(cur && cur.rough){
    h+='<div class="card rough"><p class="reason">Rough day. One thing only.</p>'
      +'<p class="surface-text">'+esc(state.roughFloor)+'</p>'
      +'<div class="actions">';
    if(!todayDone){
      h+='<button class="btn primary full" onclick="floorDone()">Mark the floor done</button>';
    }
    h+='<button class="btn ghost full" onclick="toggleRough()">Back to normal</button>'
      +'</div></div>';
  } else if(cur && cur.taken){
    var t=state.tasks.find(function(x){return x.id===cur.taskId;});
    h+='<div class="card"><p class="reason">Doing now'+(t&&t.domain?' \u00b7 '+esc(t.domain):'')+'</p>'
      +'<p class="surface-text">'+esc(t?t.text:'')+'</p>'
      +'<div class="actions">'
      +'<button class="btn primary full" onclick="done()">Mark it done</button>'
      +'<button class="btn ghost full" onclick="back()">Put it back</button>'
      +'</div>';
    if(t){ h+=(routingFor===t.id?routePanel(t):'<button class="btn ghost full" onclick="openRoute(\''+t.id+'\')" style="margin-top:10px">Route to a domain \u2192</button>'); }
    h+='</div>';
  } else if(cur){
    var t2=state.tasks.find(function(x){return x.id===cur.taskId;});
    h+='<div class="card"><p class="reason">'+esc(cur.reasonText||reasonString(cur.reason,t2,now))+'</p>'
      +'<p class="surface-text">'+esc(t2?t2.text:'')+'</p>'
      +'<div class="actions">'
      +'<button class="btn primary" onclick="take()">Take it</button>'
      +'<button class="btn" onclick="pass()">Pass</button>'
      +'<button class="btn ghost full" onclick="setView(\'look\')">Let me look</button>'
      +'</div>';
    if(apiKey){
      h+='<div class="capture" style="margin-top:10px">'
        +'<input id="ctx" placeholder="Say where you are \u2014 e.g. out, 20 min, no laptop" autocomplete="off" '
        +'onkeydown="if(event.key===\'Enter\')ctxSubmit()"><button class="add" onclick="ctxSubmit()">Find</button></div>';
    }
    h+='</div>';
  } else {
    var untriaged=state.tasks.filter(function(t){return !t.triaged;}).length;
    var msg;
    if(todayDone) msg='Nothing else waiting. Rest, or capture below.';
    else if(untriaged>0) msg='Nothing in the pool yet \u2014 '+untriaged+' waiting to triage on the Pile.';
    else msg='Capture something below to start.';
    h+='<div class="card"><div class="empty"><b>Nothing waiting.</b>'+msg+'</div></div>';
  }

  h+='<div class="roughrow"><button class="'+(state.current&&state.current.rough?'on':'')+'" onclick="toggleRough()">'
    +(state.current&&state.current.rough?'':'Rough day? Surface one floor action')+'</button></div>';

  h+='<div class="capture"><input id="cap" placeholder="Capture a task\u2026" autocomplete="off" '
    +'onkeydown="if(event.key===\'Enter\')capture()"><button class="add" onclick="capture()">Add</button></div>';
  return h;
}

function byAge(a,b){return a.createdAt-b.createdAt;}
function deadlineMeta(t,now){if(t.deadline==null)return'';var n=daysUntil(t.deadline,now);return n<0?Math.abs(n)+'d overdue':n===0?'due today':'due in '+n+'d';}
function captureRow(){return '<div class="capture" style="margin-top:16px"><input id="cap" placeholder="Capture a task\u2026" autocomplete="off" onkeydown="if(event.key===\'Enter\')capture()"><button class="add" onclick="capture()">Add</button></div>';}

/* ============================================================
   KEYSTONE — manual domain tag + deterministic paste-prompt.
   Model-free by design: domain is a one-tap manual pick; the prompt
   is a template assembled from fields already on the task. Works
   with no key, offline, every time. The silent categorizer sweep
   layers on LATER as the tap-saver; it does not exist yet and
   nothing here depends on it. The prompt is generated regardless of
   whether the domain project exists — it just needs the project live
   to have somewhere to land.
   ============================================================ */
var DOMAINS=['Work','Soccer','Financial','Household']; // LOCKED byte-identical: project name = tag = enum. Household != Family.
var routingFor=null;   // task id whose route panel is open (transient UI, not persisted)
var copiedFor=null;    // task id whose prompt was just copied (transient UI)

function setDomain(id,domain){
  state=Object.assign({},state,{tasks:state.tasks.map(function(t){return t.id===id?Object.assign({},t,{domain:domain}):t;})});
  copiedFor=null; saveState(); render();
}
function openRoute(id){ routingFor=id; copiedFor=null; render(); }
function closeRoute(){ routingFor=null; copiedFor=null; render(); }

// Lean by design: the domain project's open-ritual already reads canonical and
// reports freshness + log-top on orient, so the prompt does NOT re-carry context.
function buildPastePrompt(t){
  var shape = t.tooBig ? 'break it down (flagged too big to start in one go)' : 'do it';
  var lines=['['+t.domain+' \u2014 from Daily Loop]','Task: '+t.text,'Shape: '+shape];
  if(t.deadline!=null){var n=daysUntil(t.deadline,Date.now());
    lines.push('Timing: '+(n<0?'overdue by '+Math.abs(n)+'d':n===0?'due today':n===1?'due tomorrow':'due in '+n+'d'));}
  lines.push('Starting this now in '+t.domain+'.');
  return lines.join('\n');
}
function legacyCopy(text){
  try{var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);}catch(e){}
}
function copyPrompt(id){
  var t=state.tasks.find(function(x){return x.id===id;}); if(!t||!t.domain)return;
  var text=buildPastePrompt(t);
  function ok(){ copiedFor=id; render(); }
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(ok,function(){legacyCopy(text);ok();}); }
    else { legacyCopy(text); ok(); }
  }catch(e){ legacyCopy(text); ok(); }
}
function domainPill(t){ return t.domain?'<span class="pill dom">'+esc(t.domain)+'</span> ':''; }
function routeBtn(t){ return '<button class="iconbtn" onclick="openRoute(\''+t.id+'\')" title="Route to a domain">\u2192</button>'; }
function routePanel(t){
  var h='<div class="route"><div class="routelabel">Route to a domain</div><div class="chips">';
  DOMAINS.forEach(function(d){ h+='<button class="chip'+(t.domain===d?' on':'')+'" onclick="setDomain(\''+t.id+'\',\''+d+'\')">'+d+'</button>'; });
  h+='</div>';
  if(t.domain){
    h+='<pre class="pp">'+esc(buildPastePrompt(t))+'</pre>'
      +'<div class="routeactions"><button class="btn primary" onclick="copyPrompt(\''+t.id+'\')">'+(copiedFor===t.id?'Copied \u2713':'Copy prompt')+'</button>'
      +'<span class="dest">Paste into your '+esc(t.domain)+' project</span></div>';
  }
  h+='<button class="btn ghost done" onclick="closeRoute()">Done</button></div>';
  return h;
}

function renderLook(now){
  if(state.tasks.length===0)
    return '<div class="empty"><b>The pile is empty.</b>Capture something on the Now screen.</div>'+captureRow();

  var untriaged=state.tasks.filter(function(t){return !t.triaged;}).sort(byAge);
  var ready=state.tasks.filter(function(t){return t.triaged && !t.tooBig;}).sort(byAge);
  var big=state.tasks.filter(function(t){return t.triaged && t.tooBig;}).sort(byAge);
  var h='';

  // Untriaged holding area — one action: Triage (optionally set deadline/too-big, then add to pool)
  if(untriaged.length){
    h+='<h2>Needs triage \u00b7 '+untriaged.length+'</h2>';
    untriaged.forEach(function(t){
      var m=deadlineMeta(t,now);
      h+='<div class="row"><div class="t">'+esc(t.text)
        +'<div class="meta">'
        +domainPill(t)
        +(t.tooBig?'<span class="pill big">too big</span> ':'')
        +(t.deadline!=null?'<span class="pill">'+m+'</span> ':'')
        +'</div></div>'
        +'<button class="iconbtn" onclick="cycleDeadline(\''+t.id+'\')" title="Set deadline">\u23f1</button>'
        +'<button class="iconbtn" onclick="toggleBig(\''+t.id+'\')" title="Too big">\u2702</button>'
        +'<button class="iconbtn" onclick="triageToPool(\''+t.id+'\')" title="Add to pool">\u2713</button>'
        +routeBtn(t)
        +'<button class="iconbtn" onclick="removeTask(\''+t.id+'\')" title="Delete">\u00d7</button>'
        +'</div>'+(routingFor===t.id?routePanel(t):'');
    });
  }

  // Surfaceable pool — the daily loop
  if(ready.length){
    h+='<h2>Ready \u00b7 '+ready.length+'</h2>';
    ready.forEach(function(t){
      var m=deadlineMeta(t,now);
      h+='<div class="row"><div class="t">'+esc(t.text)
        +'<div class="meta">'+domainPill(t)+(t.deadline!=null?'<span class="pill">'+m+'</span> ':'')+'</div></div>'
        +'<button class="iconbtn" onclick="takeSpecific(\''+t.id+'\')" title="Do this">do</button>'
        +'<button class="iconbtn" onclick="cycleDeadline(\''+t.id+'\')" title="Set deadline">\u23f1</button>'
        +'<button class="iconbtn" onclick="toggleBig(\''+t.id+'\')" title="Too big">\u2702</button>'
        +routeBtn(t)
        +'<button class="iconbtn" onclick="removeTask(\''+t.id+'\')" title="Delete">\u00d7</button>'
        +'</div>'+(routingFor===t.id?routePanel(t):'');
    });
  }

  // Too-big holding area — one action: Break down. Parent is KEPT, never deleted by break-down.
  if(big.length){
    h+='<h2>Too big \u00b7 '+big.length+'</h2>';
    big.forEach(function(t){
      h+='<div class="row"><div class="t">'+esc(t.text)
        +'<div class="meta">'+domainPill(t)+'<span class="pill big">too big</span></div></div>'
        +'<button class="iconbtn" onclick="breakDown(\''+t.id+'\')" title="Break off one step">step</button>'
        +'<button class="iconbtn" onclick="toggleBig(\''+t.id+'\')" title="Not too big">\u21a9</button>'
        +routeBtn(t)
        +'<button class="iconbtn" onclick="removeTask(\''+t.id+'\')" title="Delete">\u00d7</button>'
        +'</div>'+(routingFor===t.id?routePanel(t):'');
    });
  }

  h+=captureRow();
  return h;
}

// lightweight triage: cycle none -> today -> +1 -> +3 -> none
function cycleDeadline(id){
  var t=state.tasks.find(function(x){return x.id===id;}); if(!t)return;
  var n = t.deadline==null?null:daysUntil(t.deadline,Date.now());
  var next; if(n===null)next=0; else if(n<=0)next=1; else if(n<=1)next=3; else next=null;
  setDeadlineDays(id,next);
}

function renderDone(){
  var keys=Object.keys(state.doneLog).filter(function(k){return state.doneLog[k]&&state.doneLog[k].length;}).sort().reverse();
  if(keys.length===0)return '<div class="empty"><b>No days logged yet.</b>Finish one thing and this fills in.</div>';
  var h='<h2>Done log</h2>';
  keys.forEach(function(k){
    h+='<div class="dayblock"><div class="d">'+k+' \u00b7 '+state.doneLog[k].length+(state.doneLog[k].length===1?' thing':' things')+'</div>';
    state.doneLog[k].slice().reverse().forEach(function(e){ h+='<div class="done">'+esc(e.text)+'</div>'; });
    h+='</div>';
  });
  return h;
}

function renderSheet(){
  return '<div class="sheet" onclick="if(event.target===this)closeSheet()"><div class="panel">'
    +'<div class="closebar"><button onclick="closeSheet()">Close</button></div>'
    +'<h3>Backup</h3><p>This data lives only on this device. '
    +'Protected storage is <b>'+(persistStatus==='on'?'on — Chrome won\u2019t evict this':persistStatus==='best-effort'?'best-effort':'checking\u2026')+'</b>. '
    +'Either way, export now and then so an uninstall, a phone swap, or clearing Chrome data never costs your day count.</p>'
    +'<button class="btn primary" onclick="exportData()">Export backup (.json)</button>'
    +'<button class="btn" onclick="importData()">Restore from backup</button>'
    +'<label>Claude API key (optional \u2014 powers smarter picks)</label>'
    +'<input id="apikey" type="password" autocomplete="off" placeholder="'+(apiKey?'\u2022\u2022\u2022\u2022 set \u2014 paste to replace':'sk-ant-\u2026')+'">'
    +'<button class="btn" onclick="saveKey()">Save key</button>'
    +(apiKey?'<button class="btn ghost" onclick="clearKey()">Remove key</button>':'')
    +'<p>Stored only on this device, in its own slot \u2014 never included in your backup export. '
    +'No key set means the loop runs fully on the deterministic floor; it just won\u2019t call the model.</p>'
    +'<label>Rough-day floor action</label>'
    +'<input id="floor" value="'+esc(state.roughFloor)+'" onchange="commit(function(s){return Object.assign({},s,{roughFloor:document.getElementById(\'floor\').value});})">'
    +'</div></div>';
}

loadApiKey();
render();
requestPersistence();
</script>
